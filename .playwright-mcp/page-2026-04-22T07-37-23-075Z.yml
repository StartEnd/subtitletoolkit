                - heading "Effortless time syncing" [level=3] [ref=e105]
              - paragraph [ref=e106]: Fix out-of-sync audio and subtitles in seconds. The time-shifting feature allows you to adjust the start times of the subtitles for a perfect match with the video.
            - generic [ref=e107]:
