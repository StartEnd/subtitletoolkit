                - heading "User-friendly & secure processing" [level=3] [ref=e112]
              - paragraph [ref=e113]: A simple, intuitive interface makes subtitle editing a breeze. Plus, privacy is a top priority. All processing is done securely in the browser—files are never uploaded.
        - generic [ref=e114]:
          - heading "Key subtitle formats supported" [level=2] [ref=e115]
          - generic [ref=e116]:
            - generic [ref=e117]:
              - heading "SubRip (.SRT)" [level=3] [ref=e119]
              - paragraph [ref=e120]: "The most widely supported format for subtitles. SRT files are simple plain text, making them easy to create and edit. They are perfect for basic subtitles with no special styling or positioning. The structure is simple: a sequence number, timecodes (with milliseconds), and the subtitle text itself."
            - generic [ref=e121]:
              - heading "WebVTT (.VTT)" [level=3] [ref=e123]
              - paragraph [ref=e124]: Designed for the web, WebVTT files support basic formatting like font style and color, and can include metadata. They are ideal for online video players and are widely supported by modern web browsers. This format is great for enhancing the user experience on websites like YouTube.
            - generic [ref=e125]:
              - heading "SubViewer (.SBV)" [level=3] [ref=e127]
              - paragraph [ref=e128]: Developed by Google, the SBV format is a simple text-based format often used with YouTube. It is very similar to SRT but uses a different timecode separator and a simpler structure. This format is great for quick uploads to the platform.
