            - heading "Extensive tools collection" [level=3] [ref=e160]
            - paragraph [ref=e161]: PDF24 offers you a collection of tools that you can use to work productively with PDFs and other files. The PDF24 tools leave nothing to be desired. There is hardly anything in the PDF area that you cannot do with PDF24.
          - generic [ref=e162]:
            - generic [ref=e163]: 
            - heading "Easy to use" [level=3] [ref=e164]
            - paragraph [ref=e165]: The PDF24 tools were developed to be as easy to use as possible. Intuitive usability was the goal. We have achieved this goal and that is why the PDF24 tools are so popular.
          - generic [ref=e166]:
            - generic [ref=e167]: 
            - heading "Safety is important to us" [level=3] [ref=e168]
            - paragraph [ref=e169]:
              - text: File transfers to the PDF24 servers are encrypted. All files are completely removed from our servers after a short time. If you want to be even more secure, you can use the
              - link "PDF24 Creator" [ref=e170] [cursor=pointer]:
                - /url: /en/creator
              - text: ", where all files remain on your PC."
          - generic [ref=e171]:
            - generic [ref=e172]: 
            - heading "No installation necessary" [level=3] [ref=e173]
            - paragraph [ref=e174]: PDF24's online tools work directly in the web browser. You do not need to install any software. This means you can use the PDF24 tools on any device with an Internet connection.
          - generic [ref=e175]:
            - generic [ref=e176]: 
            - heading "Supports your system" [level=3] [ref=e177]
            - paragraph [ref=e178]: PDF24 supports all current operating systems and browsers. Whether on Windows, Linux, MACs or smartphones, PDF24 does a good job almost everywhere.
          - generic [ref=e179]:
            - generic [ref=e180]: 
            - heading "Saves your resources" [level=3] [ref=e181]
            - paragraph [ref=e182]: The PDF24 Online Tools process files on special PDF24 servers. Your system is not burdened in the process and therefore does not need any special requirements.
          - generic [ref=e183]:
            - generic [ref=e184]: 
            - heading "100% free of charge" [level=3] [ref=e185]
            - paragraph [ref=e186]: You can use all PDF24 tools free of charge and without any restrictions. This is achieved via some advertising on the web pages. PDF24 is not greedy, but smart.
          - generic [ref=e187]:
            - generic [ref=e188]: 
            - heading "No limits" [level=3] [ref=e189]
            - paragraph [ref=e190]: There are no artificial limits at PDF24. Thanks to our scalable infrastructure, we can make everything that the PDF24 tools can do available to users.
